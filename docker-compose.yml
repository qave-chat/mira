services:
  postgres:
    image: postgres:17-alpine
    container_name: mira-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mira

volumes:
  postgres-data:

networks:
  mira:
    name: mira
